spring:
  application:
    name: ocr-service

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/ocr_db}
      database: ${MONGO_DB:ocr_db}
      auto-index-creation: true

  servlet:
    multipart:
      enabled: true
      max-file-size: ${OCR_MAX_FILE_SIZE:50MB}
      max-request-size: ${OCR_MAX_REQUEST_SIZE:55MB}

server:
  port: ${OCR_SERVICE_PORT:8090}

ocr:
  tessdata-path: ${OCR_TESSDATA_PATH:src/main/resources/tessdata}
  language: ${OCR_LANGUAGE:fas+eng}
  pdf-dpi: ${OCR_PDF_DPI:250}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:ocr-documents}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.ocrservice: DEBUG
